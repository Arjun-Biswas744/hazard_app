version: "1"
services:
- type: web
  name: Hazard_tool
  runtime: python
  repo: https://github.com/Arjun-Biswas744/hazard_app
  plan: free
  region: singapore

  buildCommand: |
    pip install --upgrade pip
    pip install -r requirements.txt

  startCommand: gunicorn app:app

  envVars:
    - key: PYTHON_VERSION
      value: 3.11.9

  autoDeployTrigger: commit
