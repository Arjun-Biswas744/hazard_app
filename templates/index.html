<!DOCTYPE html>
<html>
<head>
    <title>Hazard Tool</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<h2>Uniform Hazard Spectrum Tool</h2>

<input type="number" id="rp" placeholder="Enter Return Period">
<button onclick="run()">Run</button>

<h3>Hazard Curves</h3>
<div id="plot1"></div>

<h3>Hazard + Return Period</h3>
<div id="plot2"></div>

<h3>UHS</h3>
<div id="plot3"></div>

<script>
<script>
function run() {

    let rp = document.getElementById("rp").value;

    fetch("/compute", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({return_period: rp})
    })
    .then(r => r.json())
    .then(data => {

        let lambda = data.lambda;

        let traces = [];

        // =========================
        // Hazard Curves (Plot 1)
        // =========================
        for (let key in data.hazard_curves) {
            let c = data.hazard_curves[key];

            traces.push({
                x: c.intensity,
                y: c.lambda,
                mode: "lines+markers",
                name: "T = " + key + " s"
            });
        }

        Plotly.newPlot("plot1", traces, {
            title: "Hazard Curves (Annual Frequency)",
            xaxis: {
                title: "Spectral Acceleration (g)",
                type: "log",
                showgrid: true,
                gridcolor: "lightgray"
            },
            yaxis: {
                title: "Annual Frequency of Exceedance (λ)",
                type: "log",
                showgrid: true,
                gridcolor: "lightgray"
            },
            legend: {
                font: {size: 10}
            }
        });

        // =========================
        // Hazard + Return Period (Plot 2)
        // =========================
        let traces2 = [...traces];

        traces2.push({
            x: [0.001, 5],
            y: [lambda, lambda],
            mode: "lines",
            name: "Return Period Line",
            line: {dash: "dash"}
        });

        Plotly.newPlot("plot2", traces2, {
            title: "Hazard Curves with Return Period Line",
            xaxis: {
                title: "Spectral Acceleration (g)",
                type: "log",
                showgrid: true,
                gridcolor: "lightgray"
            },
            yaxis: {
                title: "Annual Frequency of Exceedance (λ)",
                type: "log",
                showgrid: true,
                gridcolor: "lightgray"
            },
            legend: {
                font: {size: 10}
            }
        });

        // =========================
        // UHS Plot (Plot 3)
        // =========================
        Plotly.newPlot("plot3", [{
            x: data.uhs_periods,
            y: data.uhs_values,
            mode: "lines+markers",
            name: "UHS"
        }], {
            title: "Uniform Hazard Spectrum (" + rp + " yrs)",
            xaxis: {
                title: "Period (s)",
                showgrid: true,
                gridcolor: "lightgray"
            },
            yaxis: {
                title: "Spectral Acceleration (g)",
                showgrid: true,
                gridcolor: "lightgray"
            },
            legend: {
                font: {size: 10}
            }
        });

    });
}
</script>

</body>
</html>
