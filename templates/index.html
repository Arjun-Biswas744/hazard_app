<!DOCTYPE html>
<html>
<head>
    <title>Hazard Tool</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<h2>Uniform Hazard Spectrum Tool</h2>

<input type="number" id="rp" placeholder="Enter Return Period">
<button onclick="run()">Run</button>

<h3>Hazard Curves</h3>
<div id="plot1"></div>

<h3>Hazard + Return Period</h3>
<div id="plot2"></div>

<h3>UHS</h3>
<div id="plot3"></div>

<script>
function run() {

    let rp = document.getElementById("rp").value;

    fetch("/compute", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({return_period: rp})
    })
    .then(r => r.json())
    .then(data => {

        let lambda = data.lambda;

        let traces = [];

        for (let key in data.hazard_curves) {
            let c = data.hazard_curves[key];

            traces.push({
                x: c.intensity,
                y: c.lambda,
                mode: "lines+markers",
                name: "T=" + key
            });
        }

        Plotly.newPlot("plot1", traces, {
            xaxis: {type: "log"},
            yaxis: {type: "log"}
        });

        let traces2 = [...traces];
        traces2.push({
            x: [0.001, 5],
            y: [lambda, lambda],
            mode: "lines",
            line: {dash: "dash", color: "red"}
        });

        Plotly.newPlot("plot2", traces2, {
            xaxis: {type: "log"},
            yaxis: {type: "log"}
        });

        Plotly.newPlot("plot3", [{
            x: data.uhs_periods,
            y: data.uhs_values,
            mode: "lines+markers"
        }]);

    });
}
</script>

</body>
</html>
